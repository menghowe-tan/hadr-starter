# Monitor loop — deterministic, model-free (PRD decisions #17–18).
# Fetch → normalise → merge → diff; on change, commit data/ and redeploy the
# live dashboard. A failed cycle skips silently (the next cycle retries);
# both real-time feeds down (this cycle, or ≥1h of silence) fails loudly
# (PRD §7, scripts/health.py).
#
# Cadence decided in slice V3 (PRD §12): every 15 minutes — a 5-min cron
# jitters badly and burns the free-tier minutes quota.

name: Monitor loop

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Replay fixture under tests/fixtures/ (omit for a live fetch)
        type: choice
        default: eventful
        options: [eventful, quiet, gdacs-down, both-down, live]
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: monitor-loop
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      # The deterministic pipeline (PRD §3 stages, scripts/pipeline/).
      # Exit 3 = abort-blind: both real-time feeds down, handled below
      # without failing the whole job (a monitor cycle degrades, it
      # doesn't crash — PRD §7).
      - id: pipeline
        continue-on-error: true # a failed cycle skips silently (§7)
        run: |
          scenario="${{ inputs.scenario || 'eventful' }}"
          if [ "$scenario" = "live" ]; then
            uv run scripts/run.py
          else
            uv run scripts/run.py --replay "tests/fixtures/$scenario"
          fi

      - name: Commit store on change
        id: store
        if: steps.pipeline.outcome == 'success'
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name "hadr-monitor[bot]"
            git config user.email "hadr-monitor[bot]@users.noreply.github.com"
            git add data/
            git commit -m "monitor: store update ($(jq -r .run_at data/manifest.json))"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "no store change — deploying nothing"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render dashboard
        if: steps.store.outputs.changed == 'true'
        run: uv run scripts/render_dashboard.py

      - name: Deploy
        if: steps.store.outputs.changed == 'true'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_SITE_URL: ${{ secrets.NETLIFY_SITE_URL }}
        run: uv run scripts/deploy.py

      # Persistent blindness alerts without waiting for the morning run:
      # abort-health (both real-time feeds down) fails this workflow.
      - name: Alert on persistent feed failure
        if: always() && steps.pipeline.outputs.health == 'abort'
        run: |
          echo "::error::Both real-time feeds are down — the monitor is blind (PRD §7)."
          exit 1
